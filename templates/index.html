<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/static/logo.png" />
  <title>Chess Bot - SPB AI &amp; Data Science Club</title>
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <style id="gpu-status-css">
  .gpu-status-pill{display:inline-flex;align-items:center;gap:.45rem;padding:.28rem .7rem;border-radius:999px;border:1px solid #2a2a2a;background:#181818;font-size:.72rem;font-weight:600;letter-spacing:.03em;cursor:default;white-space:nowrap}
  .gpu-status-pill .gd{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:#444}
  .gpu-status-pill .gd.ready{background:#4ade80;box-shadow:0 0 5px #4ade8077;animation:gpuGlow 2s ease-in-out infinite}
  .gpu-status-pill .gd.busy{background:#fbbf24;box-shadow:0 0 5px #fbbf2477;animation:gpuGlow 1s ease-in-out infinite}
  .gpu-status-pill .gt{color:#555}
  .gpu-status-pill .gt.ready{color:#4ade80}
  .gpu-status-pill .gt.busy{color:#fbbf24}
  @keyframes gpuGlow{0%,100%{opacity:1}50%{opacity:.35}}
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <img src="/static/logo.png" alt="Chess Bot" style="width:44px;height:44px;border-radius:8px;object-fit:contain;display:block;" />
        <div class="logo-title">Chess Bot</div>
      </div>
      <div style="display:flex;align-items:center;gap:.75rem">
      <div class="gpu-status-pill" id="gpuPill"><div class="gd" id="gpuDot"></div><span class="gt" id="gpuTxt">GPU...</span></div>
      <a href="https://github.com/SPB-AI-Data-Science-Club" target="_blank" class="github-link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
        </svg>
        GitHub
      </a>
      </div>
    </div>
  </header>

  <main class="main">
    <aside class="setup-panel" id="setupPanel">
      <h2 class="panel-title">New Game</h2>

      <!-- Setup section: hidden while a game is active -->
      <div id="setupSection">
        <div class="section-label">Difficulty</div>
        <div class="elo-grid" id="eloGrid">
          {% for elo, info in elo_levels.items() %}
          <button class="elo-btn {% if elo == 1600 %}active{% endif %}"
                  data-elo="{{ elo }}">
            <span class="elo-name">{{ info.name }}</span>
            <span class="elo-rating">{{ elo }}</span>
            <span class="elo-desc">{{ info.desc }}</span>
          </button>
          {% endfor %}
        </div>

        <div class="section-label" style="margin-top:1.5rem">Play As</div>
        <div class="color-toggle">
          <button class="color-btn active" data-color="white">White</button>
          <button class="color-btn" data-color="black">Black</button>
        </div>

        <button class="start-btn" id="startBtn">Start Game</button>
      </div>

      <!-- In-game controls: hidden until a game starts -->
      <div class="ingame-controls hidden" id="ingameControls">
        <div class="divider"></div>
        <div class="status-box" id="statusBox">
          <div class="status-label">Status</div>
          <div class="status-text" id="statusText">Your turn</div>
        </div>
        <div class="elo-display" id="eloDisplay"></div>
        <button class="hint-btn" id="hintBtn">Hint</button>
        <button class="new-game-btn" id="newGameBtn">New Game</button>
      </div>
    </aside>

    <section class="board-area">
      <div class="board-wrapper">
        <div class="capture-bar" id="captureTop">
          <span class="cap-name" id="capTopName"></span>
          <span class="cap-pieces" id="capTopPieces"></span>
          <span class="cap-score" id="capTopScore"></span>
        </div>
        <div id="chessboard"></div>
        <div class="capture-bar" id="captureBottom">
          <span class="cap-name" id="capBotName"></span>
          <span class="cap-pieces" id="capBotPieces"></span>
          <span class="cap-score" id="capBotScore"></span>
        </div>
      </div>
    </section>

    <aside class="history-panel">
      <h2 class="panel-title">Move History</h2>
      <div class="move-list" id="moveList">
        <div class="no-moves">No moves yet</div>
      </div>
    </aside>
  </main>

  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal">
      <div class="modal-title" id="modalTitle">Game Over</div>
      <div class="modal-sub" id="modalSub"></div>
      <button class="start-btn" id="modalNewGame">Play Again</button>
      <button class="new-game-btn" id="modalSetup" style="margin-top:.5rem">Change Settings</button>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
  <script src="{{ url_for('static', filename='js/game.js') }}"></script>

<script id="gpu-status-js">
(function(){
  function upd(){
    fetch('https://spbdatascience.org/api/gpu-status')
      .then(function(r){return r.json();})
      .then(function(d){
        var s=d.status||'offline';
        var dot=document.getElementById('gpuDot');
        var txt=document.getElementById('gpuTxt');
        dot.className='gd '+(s==='ready'||s==='busy'?s:'');
        txt.className='gt '+(s==='ready'||s==='busy'?s:'');
        txt.textContent=s==='ready'?'RTX 5080 Ready':s==='busy'?'GPU Busy':'GPU Offline';
      }).catch(function(){
        document.getElementById('gpuTxt').textContent='GPU Offline';
      });
  }
  upd();setInterval(upd,20000);
})();
</script>
</body>
</html>
